# Windows CI pipeline for cloudflared
# Handles building and packaging for Windows targets

.windows_defaults: &windows_defaults
  tags:
    - windows
  before_script:
    - $env:GOPATH = "$env:USERPROFILE\go"
    - $env:PATH = "$env:GOPATH\bin;$env:PATH"
    - go version
    - go env

build-windows-amd64:
  <<: *windows_defaults
  stage: build
  variables:
    GOOS: windows
    GOARCH: amd64
    TARGET: cloudflared-windows-amd64.exe
  script:
    - go build -v -ldflags "-X 'main.Version=$CI_COMMIT_TAG' -X 'main.BuildTime=$CI_PIPELINE_CREATED_AT'" -o $TARGET ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build-windows-386:
  <<: *windows_defaults
  stage: build
  variables:
    GOOS: windows
    GOARCH: "386"
    TARGET: cloudflared-windows-386.exe
  script:
    - go build -v -ldflags "-X 'main.Version=$CI_COMMIT_TAG' -X 'main.BuildTime=$CI_PIPELINE_CREATED_AT'" -o $TARGET ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-386.exe
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

test-windows:
  <<: *windows_defaults
  stage: test
  variables:
    GOOS: windows
    GOARCH: amd64
  script:
    - go test -v -count=1 -timeout 60s ./...
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

package-msi-amd64:
  <<: *windows_defaults
  stage: package
  needs:
    - build-windows-amd64
  variables:
    MSI_VERSION: "${CI_COMMIT_TAG:-0.0.0}"
  script:
    - choco install wixtoolset --no-progress -y
    - $env:PATH = "C:\Program Files (x86)\WiX Toolset v3.11\bin;$env:PATH"
    - |
      if (-not $CI_COMMIT_TAG) {
        $env:MSI_VERSION = "0.0.0"
      } else {
        $env:MSI_VERSION = $CI_COMMIT_TAG.TrimStart('v')
      }
    - candle.exe -arch x64 -dVersion="$env:MSI_VERSION" -dBinaryPath="cloudflared-windows-amd64.exe" packaging/cloudflared.wxs
    - light.exe -ext WixUIExtension cloudflared.wixobj -o cloudflared-amd64.msi
  artifacts:
    paths:
      - cloudflared-amd64.msi
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'

release-windows:
  <<: *windows_defaults
  stage: release
  needs:
    - build-windows-amd64
    - build-windows-386
    - package-msi-amd64
  script:
    - |
      Write-Host "Uploading Windows artifacts for release $CI_COMMIT_TAG"
      $files = @(
        "cloudflared-windows-amd64.exe",
        "cloudflared-windows-386.exe",
        "cloudflared-amd64.msi"
      )
      foreach ($file in $files) {
        if (Test-Path $file) {
          Write-Host "Artifact ready: $file"
        } else {
          Write-Error "Missing artifact: $file"
          exit 1
        }
      }
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
      - cloudflared-windows-386.exe
      - cloudflared-amd64.msi
    expire_in: 4 weeks
  rules:
    - if: '$CI_COMMIT_TAG'
